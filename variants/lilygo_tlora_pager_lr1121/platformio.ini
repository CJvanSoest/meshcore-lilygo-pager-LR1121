; ============================================================================
; LilyGo T-LoRa Pager (LR1121 multi-band variant)
;
; Hardware: ESP32-S3-N16R8 + LR1121 (sub-GHz + 2.4 GHz LoRa), ST7796 IPS LCD
;           (480x222), TCA8418 keyboard, rotary encoder, GPS, NFC ST25R3916,
;           BQ25896 PMU, BQ27220 fuel gauge, BHI260 IMU, AXP-style audio,
;           XL9555 I2C IO-expander.
;
; LoRa radio: LR1121 = LR1110 minus WiFi/GNSS scan and S-band — RadioLib's
; LR1110 driver works for both. MeshCore CustomLR1110 wrapper is reused.
;
; Pinmap source: Xinyuan-LilyGO/LilyGoLib-PlatformIO/variants/lilygo_tlora_pager
; ============================================================================

[T_LoRa_Pager_LR1121]
extends = esp32_base
board = esp32-s3-devkitc-1
build_flags =
  ${esp32_base.build_flags}
  -I variants/lilygo_tlora_pager_lr1121
  -D T_LORA_PAGER_LR1121

  ; --- LR1121 radio (uses RadioLib's LR1110 class; LR1121 is a register-subset) ---
  -D USE_LR1110=1
  -D RADIO_CLASS=CustomLR1110
  -D WRAPPER_CLASS=CustomLR1110Wrapper
  -D LORA_TX_POWER=22
  -D LORA_SF=7              ; NL standaard (base default is 8)
  -D LR11X0_DIO3_TCXO_VOLTAGE=1.8
  -D RX_BOOSTED_GAIN=true

  ; --- LoRa pinmap (LilyGo T-Pager) ---
  -D P_LORA_NSS=36
  -D P_LORA_DIO_1=14
  -D P_LORA_RESET=47
  -D P_LORA_BUSY=48
  -D P_LORA_SCLK=35
  -D P_LORA_MISO=33
  -D P_LORA_MOSI=34

  ; --- Shared I2C bus (BHI260, PCF85063 RTC, BQ25896, DRV2605, ES8311, XL9555) ---
  -D PIN_BOARD_SDA=3
  -D PIN_BOARD_SCL=2

  ; --- GPS (UART1) ---
  -D PIN_GPS_RX=4
  -D PIN_GPS_TX=12
  -D ENV_INCLUDE_GPS=1
  ; L76K power rail is switched on in TLoraPagerBoard::begin() (XL9555 pin 4).
  ; A cold module can take >1 s to emit its first NMEA sentence, longer than
  ; initBasicGPS()'s boot probe, which would otherwise flag "no GPS" and shut
  ; the receiver off for good. Skip that probe and keep the GPS powered +
  ; polled continuously so it can actually acquire a fix outdoors.
  -D ENV_SKIP_GPS_DETECT=1
  -D PERSISTANT_GPS=1

  ; --- ESP32-S3 native USB-CDC for serial + flashing ---
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

  ; --- PSRAM enable (S3.6b/d) ---
  ; ESP32-S3-N16R8 = 16 MB flash + 8 MB octal PSRAM. heap_caps_calloc with
  ; MALLOC_CAP_SPIRAM returns NULL until PSRAM is actually initialized; the
  ; Arduino core needs BOARD_HAS_PSRAM at compile time, and the memory_type
  ; setting picks the QSPI/OPI driver.
  -D BOARD_HAS_PSRAM

board_build.partitions = variants/lilygo_tlora_pager_lr1121/partitions.csv
board_build.arduino.memory_type = qio_qspi  ; quad PSRAM — opi mode fails to
                                            ; init on this board ("PSRAM chip
                                            ; not found or wrong line mode").
board_upload.flash_size = 16MB
board_upload.maximum_size = 5242880   ; 5 MB app partition
board_build.f_flash = 80000000L
board_build.flash_mode = dio

build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/lilygo_tlora_pager_lr1121>
  +<helpers/sensors>

lib_deps =
  ${esp32_base.lib_deps}
  stevemarple/MicroNMEA @ ^2.0.6
  lovyan03/LovyanGFX @ ^1.2.7
  adafruit/Adafruit TCA8418 @ ^1.0.1
  lvgl/lvgl @ ~9.2.2

; ============================================================================
; Companion firmware over USB serial (talks to phone-app / web-client / meshcli)
; ============================================================================
[env:T_LoRa_Pager_LR1121_companion_radio_usb]
extends = T_LoRa_Pager_LR1121
build_flags =
  ${T_LoRa_Pager_LR1121.build_flags}
  ; Variant's UI dir BEFORE companion's so our UITask.h wins via include order.
  -I variants/lilygo_tlora_pager_lr1121
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  ; --- Display + input bindings (same as repeater env) ---
  -D DISPLAY_CLASS=TPagerST7796Display
  -D UI_ZOOM=2
  -D PIN_USER_BTN=7
  -D PIN_ENCODER_A=40
  -D PIN_ENCODER_B=41
  ; --- LVGL config + integration ---
  ; lv_conf.h sits in variants/.../lv_conf.h; the variant dir is already
  ; on -I so LVGL finds it via the LV_CONF_INCLUDE_SIMPLE escape hatch.
  -D LV_CONF_INCLUDE_SIMPLE
  -D LV_LVGL_H_INCLUDE_SIMPLE
build_src_filter = ${T_LoRa_Pager_LR1121.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/LGFXDisplay.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
  -<../examples/companion_radio/ui-new/UITask.cpp>   ; replaced by our LVGL UI
  +<../variants/lilygo_tlora_pager_lr1121/UITask.cpp>
  +<../variants/lilygo_tlora_pager_lr1121/TPagerLVGL.cpp>
lib_deps =
  ${T_LoRa_Pager_LR1121.lib_deps}
  densaugeo/base64 @ ~1.4.0

; ============================================================================
; Repeater firmware — small footprint, serves as relay node
; ============================================================================
[env:T_LoRa_Pager_LR1121_repeater]
extends = T_LoRa_Pager_LR1121
build_flags =
  ${T_LoRa_Pager_LR1121.build_flags}
  -D ADVERT_NAME='"CJ-TPager"'
  -D ADVERT_LAT=51.9
  -D ADVERT_LON=5.4
  -D ADMIN_PASSWORD='"changeme"'
  -D MAX_NEIGHBOURS=50
  -D DISPLAY_CLASS=TPagerST7796Display
  -D UI_ZOOM=2                 ; UI was designed for 128x64 OLED — 2x scaling for 222x480 IPS
  -D PIN_USER_BTN=7            ; ROTARY_C — encoder push button cycles screens
  -D PIN_ENCODER_A=40          ; ROTARY_A — quadrature channel A
  -D PIN_ENCODER_B=41          ; ROTARY_B — quadrature channel B
  -D NUM_SCREENS=3             ; home + About + Compose
  -D COMPOSE_BUFFER_SIZE=160   ; max chars in the compose text buffer
  -D COMPOSE_CHANNEL='"#mc-radar"'  ; target channel for compose sends (override per env)
build_src_filter = ${T_LoRa_Pager_LR1121.build_src_filter}
  +<helpers/ui/LGFXDisplay.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${T_LoRa_Pager_LR1121.lib_deps}
  ${esp32_ota.lib_deps}
