<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640"
     font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e141b"/>
      <stop offset="1" stop-color="#1c2530"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.74" cy="0.40" r="0.55">
      <stop offset="0" stop-color="#FAA61A" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FAA61A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123641"/>
      <stop offset="1" stop-color="#0b1a22"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#28323e"/>
      <stop offset="1" stop-color="#1a222c"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- faint mesh network backdrop -->
  <g stroke="#3a4756" stroke-width="1.5" opacity="0.30">
    <line x1="120" y1="470" x2="300" y2="380"/>
    <line x1="300" y1="380" x2="250" y2="180"/>
    <line x1="300" y1="380" x2="520" y2="470"/>
    <line x1="520" y1="470" x2="700" y2="360"/>
    <line x1="250" y1="180" x2="470" y2="140"/>
    <line x1="700" y1="360" x2="880" y2="250"/>
    <line x1="470" y1="140" x2="700" y2="360"/>
    <line x1="120" y1="470" x2="250" y2="180"/>
  </g>
  <g fill="#5a6b7c" opacity="0.55">
    <circle cx="120" cy="470" r="6"/>
    <circle cx="300" cy="380" r="7"/>
    <circle cx="250" cy="180" r="6"/>
    <circle cx="520" cy="470" r="6"/>
    <circle cx="470" cy="140" r="5"/>
    <circle cx="700" cy="360" r="7"/>
  </g>

  <!-- LoRa waves radiating from the antenna -->
  <g fill="none" stroke="#FAA61A" stroke-width="3.5" stroke-linecap="round" opacity="0.55">
    <path d="M 992 150 A 46 46 0 0 1 1064 150"/>
    <path d="M 974 176 A 78 78 0 0 1 1082 176" opacity="0.75"/>
    <path d="M 956 202 A 110 110 0 0 1 1100 202" opacity="0.5"/>
  </g>

  <!-- Pager device -->
  <g>
    <!-- antenna -->
    <rect x="1022" y="96" width="12" height="70" rx="6" fill="#3a4756"/>
    <circle cx="1028" cy="96" r="10" fill="#FAA61A"/>
    <!-- body -->
    <rect x="905" y="160" width="246" height="360" rx="30" fill="url(#body)" stroke="#3a4756" stroke-width="2"/>
    <!-- encoder knob -->
    <circle cx="1151" cy="300" r="12" fill="#3a4756"/>
    <!-- screen -->
    <rect x="935" y="196" width="186" height="234" rx="10" fill="url(#screen)" stroke="#0a1319" stroke-width="2"/>
    <!-- header strip -->
    <rect x="948" y="208" width="70" height="10" rx="5" fill="#80868f" opacity="0.8"/>
    <rect x="1044" y="208" width="60" height="10" rx="5" fill="#80868f" opacity="0.55"/>
    <!-- tile carousel: three tiles, middle focused (orange) -->
    <rect x="944" y="250" width="66" height="66" rx="9" fill="#1c2530" stroke="#404a55" stroke-width="2"/>
    <rect x="1020" y="244" width="76" height="78" rx="10" fill="#2b3742" stroke="#FAA61A" stroke-width="3"/>
    <rect x="1106" y="250" width="30" height="66" rx="9" fill="#1c2530" stroke="#404a55" stroke-width="2"/>
    <!-- glyphs on tiles -->
    <circle cx="977" cy="278" r="12" fill="none" stroke="#e8ecf0" stroke-width="3" opacity="0.85"/>
    <path d="M 1058 268 l 0 26 M 1046 281 l 24 0" stroke="#FAA61A" stroke-width="4" stroke-linecap="round"/>
    <!-- footer / chat line -->
    <rect x="948" y="345" width="160" height="9" rx="4.5" fill="#55cc66" opacity="0.85"/>
    <rect x="948" y="364" width="120" height="9" rx="4.5" fill="#c8cdd3" opacity="0.6"/>
    <rect x="948" y="392" width="150" height="24" rx="6" fill="#1c2530" stroke="#FAA61A" stroke-width="2"/>
  </g>

  <!-- Title block -->
  <text x="92" y="238" font-size="88" font-weight="700" fill="#ffffff" letter-spacing="-1">MeshCore</text>
  <text x="96" y="300" font-size="38" font-weight="600" fill="#FAA61A">for the LilyGo T-Lora Pager · LR1121</text>
  <text x="96" y="352" font-size="26" fill="#c8cdd3">Off-grid LoRa mesh messenger firmware — standalone, no phone required.</text>

  <!-- feature chips -->
  <g font-size="21" font-weight="600">
    <g>
      <rect x="94" y="392" width="176" height="42" rx="21" fill="#1c2530" stroke="#404a55" stroke-width="1.5"/>
      <text x="182" y="420" fill="#e8ecf0" text-anchor="middle">LVGL tile UI</text>
    </g>
    <g>
      <rect x="284" y="392" width="196" height="42" rx="21" fill="#1c2530" stroke="#404a55" stroke-width="1.5"/>
      <text x="382" y="420" fill="#e8ecf0" text-anchor="middle">GPS + offline maps</text>
    </g>
    <g>
      <rect x="494" y="392" width="212" height="42" rx="21" fill="#1c2530" stroke="#404a55" stroke-width="1.5"/>
      <text x="600" y="420" fill="#e8ecf0" text-anchor="middle">Channels · DM chat</text>
    </g>
    <g>
      <rect x="94" y="448" width="150" height="42" rx="21" fill="#1c2530" stroke="#404a55" stroke-width="1.5"/>
      <text x="169" y="476" fill="#e8ecf0" text-anchor="middle">ESP32-S3</text>
    </g>
    <g>
      <rect x="258" y="448" width="210" height="42" rx="21" fill="#1c2530" stroke="#404a55" stroke-width="1.5"/>
      <text x="363" y="476" fill="#e8ecf0" text-anchor="middle">Meshtastic alternative</text>
    </g>
  </g>

  <text x="92" y="560" font-size="19" fill="#80868f">Built on MeshCore · ESP32-S3 · Semtech LR1121 (sub-GHz + 2.4 GHz) · MIT licensed</text>
</svg>
